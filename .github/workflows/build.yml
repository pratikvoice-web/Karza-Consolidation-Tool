name: build-windows
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Provision Go Runtime environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Provision Node.js Execution Stack
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wails Compiler Stack
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Initialize Go Modules
        run: go mod tidy

      - name: Execute Native Ahead-of-Time Wails Compilation
        run: wails build -platform windows/amd64

      - name: Archive Production Release Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KarzaEngine-Go-Win64
          path: build/bin/*.exe
