name: Single Binary Compilation Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore KarzaConsolidator.csproj

    - name: Compile Standalone Executable
      run: dotnet publish KarzaConsolidator.csproj -c Release -r win-x64 --self-contained true -o ./publish

    - name: Upload Portable Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Karza-Consolidation-Engine-v2026
        path: ./publish/KarzaConsolidator.exe
